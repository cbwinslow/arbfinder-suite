name: Create Tracking Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print issues without creating)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  create-issues:
    name: Create Tracking Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Create tracking issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            python3 scripts/create_tracking_issues.py --dry-run
          else
            python3 scripts/create_tracking_issues.py --token "$GITHUB_TOKEN" --repo "${{ github.repository }}"
          fi
